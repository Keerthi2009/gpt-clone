version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: react
    ports:
      - "3001:80"
    depends_on:
      - backend