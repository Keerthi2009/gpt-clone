version: "3.9"

services:
  backend:
    build: ./backend
    container_name: fastapi
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: react
    ports:
      - "3001:80"
    env_file:
      - ./frontend/.env  
    depends_on:
      - backend